on:
  push:
    branches:
      - main

permissions:
  contents: write
  pull-requests: write

name: release-please

jobs:
  release-please:
    runs-on: ubuntu-latest
    outputs:
      backend_released: ${{ steps.release.outputs['backend/api--release_created'] }}
      backend_version: ${{ steps.release.outputs['backend/api--version'] }}
      frontend_released: ${{ steps.release.outputs['frontend--release_created'] }}
      frontend_version: ${{ steps.release.outputs['frontend--version'] }}
    steps:
      - name: Run release please
        uses: google-github-actions/release-please-action@v4
        id: release

  build-backend:
    needs: release-please
    if: ${{ needs.release-please.outputs.backend_released == 'true' }}
    runs-on: ubuntu-latest
    steps:
      - name: Check out the repo
        uses: actions/checkout@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ vars.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push backend image
        uses: docker/build-push-action@v5
        with:
          context: ./backend/api
          push: true
          tags: |
            haakonsvane/troji:backend-${{ needs.release-please.outputs.backend_version }}
            haakonsvane/troji:backend-latest

  build-frontend:
    needs: release-please
    if: ${{ needs.release-please.outputs.frontend_released == 'true' }}
    runs-on: ubuntu-latest
    steps:
      - name: Check out the repo
        uses: actions/checkout@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ vars.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push frontend image
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          push: true
          build-args: |
            CLERK_PUBLISHABLE_KEY=${{ vars.CLERK_PUBLISHABLE_KEY }}
            GRAPHQL_URL=${{ vars.GRAPHQL_URL }}
          tags: |
            haakonsvane/troji:frontend-${{ needs.release-please.outputs.frontend_version }}
            haakonsvane/troji:frontend-latest

  deploy:
    needs: [release-please, build-backend, build-frontend]
    # Run if at least one component was released and no build job failed.
    # always() is required so skipped build jobs don't automatically cancel this job.
    if: |
      always() &&
      !failure() &&
      !cancelled() &&
      (needs.release-please.outputs.backend_released == 'true' || needs.release-please.outputs.frontend_released == 'true')
    runs-on: ubuntu-latest
    steps:
      - name: Check out the repo
        uses: actions/checkout@v4

      - name: Set up SSH key
        run: |
          install -m 600 -D /dev/null ~/.ssh/id_rsa
          echo "${{ secrets.DROPLET_SSH_KEY }}" > ~/.ssh/id_rsa
          ssh-keyscan -H "${{ secrets.DROPLET_HOST }}" >> ~/.ssh/known_hosts

      - name: Ensure remote directory structure exists
        run: ssh ${{ secrets.DROPLET_USER }}@${{ secrets.DROPLET_HOST }} "mkdir -p ~/troji/caddy"

      - name: Copy compose file and Caddyfile to droplet
        run: |
          scp docker-compose.yml ${{ secrets.DROPLET_USER }}@${{ secrets.DROPLET_HOST }}:~/troji/docker-compose.yml
          scp caddy/Caddyfile ${{ secrets.DROPLET_USER }}@${{ secrets.DROPLET_HOST }}:~/troji/caddy/Caddyfile

      - name: Pull released images and restart services
        run: |
          ssh ${{ secrets.DROPLET_USER }}@${{ secrets.DROPLET_HOST }} \
            "cd ~/troji && docker compose pull && docker compose up -d --remove-orphans --no-build"
