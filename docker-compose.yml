services:
  db:
    image: postgres:alpine3.18
    restart: always
    environment:
      POSTGRES_USER: ${Database__User}
      POSTGRES_PASSWORD: ${Database__Password}
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready"]
      interval: 1s
      timeout: 5s
      retries: 10

  backend:
    image: haakonsvane/troji:backend-${BACKEND_VERSION:-latest}
    build:
      context: ./backend/api
      dockerfile: Dockerfile
    # No host port exposure — Caddy proxies /graphql internally
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      Database__Host: db
      Database__Port: "5432"
      Database__User: ${Database__User}
      Database__Password: ${Database__Password}
      Cors__Origins: ${Cors__Origins:-https://troji.me}

  frontend:
    image: haakonsvane/troji:frontend-${FRONTEND_VERSION:-latest}
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        CLERK_PUBLISHABLE_KEY: ${CLERK_PUBLISHABLE_KEY}
        GRAPHQL_URL: ${GRAPHQL_URL:-https://troji.me/graphql}
    # No host port exposure — Caddy proxies all traffic internally
    restart: unless-stopped
    depends_on:
      - backend
    environment:
      VITE_CLERK_PUBLISHABLE_KEY: ${CLERK_PUBLISHABLE_KEY}
      CLERK_SECRET_KEY: ${CLERK_SECRET_KEY}
      CLERK_SIGN_IN_URL: ${CLERK_SIGN_IN_URL:-/sign-in}
      CLERK_SIGN_IN_FALLBACK_REDIRECT_URL: ${CLERK_SIGN_IN_FALLBACK_REDIRECT_URL:-/dashboard}
      CLERK_SIGN_UP_FALLBACK_REDIRECT_URL: ${CLERK_SIGN_UP_FALLBACK_REDIRECT_URL:-/dashboard}
      GITHUB_FEEDBACK_TOKEN: ${GITHUB_FEEDBACK_TOKEN}
      GITHUB_FEEDBACK_REPO: ${GITHUB_FEEDBACK_REPO}

  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp" # HTTP/3 (QUIC)
    volumes:
      - ./caddy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data # TLS certificates — persisted across restarts
      - caddy_config:/config # Caddy runtime config
    depends_on:
      - frontend
      - backend

volumes:
  caddy_data:
  caddy_config:
