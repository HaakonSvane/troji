name: troji

services:
  db:
    image: postgres:alpine3.18
    restart: always
    environment:
      POSTGRES_USER: ${Database__User}
      POSTGRES_PASSWORD: ${Database__Password}
    ports:
      - "5432:5432"
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready" ]
      interval: 1s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./backend/api
      dockerfile: Dockerfile
    ports:
      - "5063:8080"
    depends_on:
      db:
        condition: service_healthy
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      Database__Host: db
      Database__Port: "5432"
      Database__User: ${Database__User}
      Database__Password: ${Database__Password}
      Auth__Authority: ${Auth__Authority}
      Cors__Origins: ${Cors__Origins:-http://localhost:3000}

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_CLERK_PUBLISHABLE_KEY: ${VITE_CLERK_PUBLISHABLE_KEY}
        # Browser-side code reaches the backend via the exposed host port.
        VITE_GRAPHQL_URL: ${VITE_GRAPHQL_URL:-http://localhost:5063/graphql}
    ports:
      - "3000:3000"
    depends_on:
      - backend
    environment:
      GITHUB_FEEDBACK_TOKEN: ${GITHUB_FEEDBACK_TOKEN}
      GITHUB_FEEDBACK_REPO: ${GITHUB_FEEDBACK_REPO}
