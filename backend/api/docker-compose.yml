services:
  db:
    image: postgres:alpine3.18
    restart: always
    environment:
      POSTGRES_USER: ${Database__User}
      POSTGRES_PASSWORD: ${Database__Password}
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready"]
      interval: 1s
      timeout: 5s
      retries: 10
